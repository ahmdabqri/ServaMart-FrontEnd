<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="card.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="chat.css">
    

    <title>Home Page ServaMart</title>
</head>

<header>
<nav class = "navbar">
    <div class = "logo">ServaMart</div>

    <div class="search-container">
        <img src="image/search.svg.svg" alt="Search" class="search-icon">
        <input type="text" id="search-input" placeholder="Search">
    </div>

    <div class="nav-menu">
        <a href="sell.html"><button class="sell-button">SELL</button></a>

        <a href="userProfile.html">
            <img src="image/profile-round-1342-svgrepo-com.svg">
            <span>Profile</span>
        </a>

        <a href="cart.html">
            <img src="image/cart-shopping-svgrepo-com.svg">
            <span>Cart</span>
        </a>

        <a href="chat.html">
            <img src="image/message-circle-chat-svgrepo-com.svg">
            <span>Message</span>
        </a>

        <a href="#">
            <img src="image/calendar-days-svgrepo-com.svg">
            <span>Booking</span>
        </a>
    </div>

</nav>
</header>
<body>

    <div class="servamart-bg">

    <section class="message-container">

    <!-- LEFT SIDE -->
    <div class="chat-list">

        <div class="chat-list-header">

            <h2>Inbox</h2>

            <div class="chat-filter">

                <button class="active-filter">
                    All
                </button>

                <button>
                    Selling
                </button>

                <button>
                    Buying
                </button>

            </div>

        </div>

        <div class="conversation-item active-chat">

            <img src="image/user-svgrepo-com.svg">

            <div class="conversation-info">

                <h4>Ahmad</h4>
                <p>Desporte Futsal Shoes</p>

            </div>

        </div>

        <div class="conversation-item">

            <img src="image/user-svgrepo-com.svg">

            <div class="conversation-info">

                <h4>Ali</h4>
                <p>Laptop Repair Service</p>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="chat-box">

        <div class="chat-header">

            <img src="image/user-svgrepo-com.svg">

            <div>

                <h3>Ahmad</h3>
                <small>Desporte Futsal Shoes</small>

            </div>

        </div>

        <div class="chat-messages">

            <div class="message received">
                Hi, kasut masih ada?
            </div>

            <div class="message sent">
                Ya masih ada.
            </div>

            <div class="message received">
                Boleh kurang harga?
            </div>

        </div>

        <div class="chat-input">

            <input
                type="text"
                placeholder="Type a message">

            <button class="send-btn">
                Send
            </button>

        </div>

    </div>

</section>

</div>
<script src="chat.js"></script>
</body>

<footer class="footer">
    <div class="footer-left">
        <p>&#169 2026 UTeM ServaMart </p>
    </div>
    <div class="footer-right">
        <a href="#">Help Centre</a>
        <span>|</span>
        <a href="#">Contact Us</a>
    </div>
    
</footer>
</html>
