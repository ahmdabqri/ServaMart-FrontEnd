<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="sell.css">
    

    <title>Sell Page ServaMart</title>
</head>

<header>
<nav class = "navbar">
    <div class = "logo">ServaMart</div>

    <div class="search-container">
        <img src="image/search.svg.svg" alt="Search" class="search-icon">
        <input type="text" id="search-input" placeholder="Search">
    </div>

    <div class="nav-menu">
        <button class="sell-button">SELL</button>

        <a href="#">
            <img src="image/profile-round-1342-svgrepo-com.svg">
            <span>Profile</span>
        </a>

        <a href="cart.html">
            <img src="image/cart-shopping-svgrepo-com.svg">
            <span>Cart</span>
        </a>

        <a href="#">
            <img src="image/message-circle-chat-svgrepo-com.svg">
            <span>Message</span>
        </a>

        <a href="#">
            <img src="image/calendar-days-svgrepo-com.svg">
            <span>Booking</span>
        </a>
    </div>

</nav>
</header>
<body>
    
    <div class="sell-form">

    <h2>Item Details</h2>

    <div class="form-group">
        <label>Type</label>

        <div class="type-buttons">

            <button type="button" id="productBtn" class="active">
                Product
            </button>

            <button type="button" id="serviceBtn">
                Service
            </button>

        </div>

    </div>

    <div class="form-group">
        <label>Item Name</label>

        <input type="text" id="itemName" placeholder="Enter item name">
        <small id="itemNameError" class="error"></small>
    </div>

    <div class="form-group">
        <label>Photos</label>

        <div class="photo-upload">

            <label class="photo-box">
                <input type="file" class="imageUpload" accept="image/*" hidden required>
                <img class="previewImage">
                <span class="uploadText">+</span>
            </label>

            <label class="photo-box">
                <input type="file" class="imageUpload" accept="image/*" hidden>
                <img class="previewImage">
                <span class="uploadText">+</span>
            </label>


        </div>
    </div>

    <div class="form-group">
        <label>Category</label>

        <select id="category">

            <option value="">Select Category</option>

            <option>Electronics</option>
            <option>Sports</option>
            <option>Books</option>
            <option>Fashion</option>

        </select>
        <small id="categoryError" class="error"></small>

    </div>

    <div id="conditionSection">

        <label>Condition</label>

        <div class="condition-buttons">

            <button type="button">New</button>
            <button type="button">Used</button>

            <small id="conditionError" class="error"></small>

        </div>

    </div>

    <div id="serviceFields" style="display:none;">

        <div class="form-group">

            <label>Location</label>

            <input type="text" id="location" placeholder="Service Location">

            <small id="locationError" class="error"></small>

        </div>

        <div class="form-group">

            <label>Available Date</label>

            <input type="date" id="availableDate">

            <small id="dateError" class="error"></small>

        </div>

    </div>

    <div class="form-group">

        <label>Description</label>

        <textarea
            id="description"
            rows="5"
            placeholder="Describe your item">
        </textarea>
        <small id="descriptionError" class="error"></small>

    </div>

    <div class="form-group">

        <label>Price (RM)</label>

        <input type="number" id="price" placeholder="0.00">
        <small id="priceError" class="error"></small>

    </div>

    <button class="post-btn" type="button">
        Post Item
    </button>

</div>

<script src="sell.js"></script>
   
</body>

<footer class="footer">
    <div class="footer-left">
        <p>&#169 2026 UTeM ServaMart </p>
    </div>
    <div class="footer-right">
        <a href="#">Help Centre</a>
        <span>|</span>
        <a href="#">Contact Us</a>
    </div>
    
</footer>
</html>
