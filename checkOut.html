<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="checkOut.css">
    

    <title>Checkout Page</title>
</head>

<header>
<nav class = "navbar">
    <div class = "logo">ServaMart</div>

    <div class="search-container">
        <img src="image/search.svg.svg" alt="Search" class="search-icon">
        <input type="text" id="search-input" placeholder="Search">
    </div>

    <div class="nav-menu">
        <button class="sell-button">SELL</button>

        <a href="#">
            <img src="image/profile-round-1342-svgrepo-com.svg">
            <span>Profile</span>
        </a>

        <a href="#">
            <img src="image/cart-shopping-svgrepo-com.svg">
            <span>Cart</span>
        </a>

        <a href="#">
            <img src="image/message-circle-chat-svgrepo-com.svg">
            <span>Message</span>
        </a>

        <a href="#">
            <img src="image/calendar-days-svgrepo-com.svg">
            <span>Booking</span>
        </a>
    </div>

</nav>
</header>
<body>

    <section class="checkout-container">

    <form id="checkOut-formValidation" class="checkout-form">

        <h1>Checkout</h1>

        <h2>Customer Information</h2>

        <div class="form-group">

            <input type="text" id="fullName" placeholder="Full Name">

            <small id="fullNameError" class="error"></small>

        </div>

        <div class="form-group">

            <input type="text" id="phone" placeholder="Phone Number">

            <small id="phoneError" class="error"></small>

        </div>

        <div class="form-group">

            <input type="email" id="email" placeholder="Email">

            <small id="emailError" class="error"></small>

        </div>
        
        <h2>Delivery Address</h2>

        <div class="form-group">

            <input type="text" id="address" placeholder="Address">

            <small id="addressError" class="error"></small>

        </div>
        
        <div class="form-group">

            <input type="text" id="city" placeholder="City">

            <small id="cityError" class="error"></small>

        </div>

        <div class="form-group">

            <input type="text" id="state" placeholder="State">

            <small id="stateError" class="error"></small>

        </div>

        <div class="form-group">

            <input type="text" id="postcode" placeholder="Postcode">

            <small id="postcodeError" class="error"></small>

        </div>

        
        

        <div class="payment-method">

        <h2>Payment Method</h2>

        <label>
            <input type="radio" name="payment">
            Online Banking
        </label>

        <label>
            <input type="radio" name="payment">
            Debit / Credit Card
        </label>

        <label>
            <input type="radio" name="payment">
            E-Wallet
        </label>

         <small id="paymentError" class="error"></small>

        </div>

            </form>

  

    <div class="checkout-summary">

        <h2>Order Summary</h2>

        <div class="summary-item">
            <span>Desporte Futsal Shoes</span>
            <span>RM300.00</span>
        </div>

        <div class="summary-item">
            <span>Gaming Mouse</span>
            <span>RM50.00</span>
        </div>

        <div class="summary-item">
            <span>Delivery Fee</span>
            <span>RM10.00</span>
        </div>

        <hr>

        <div class="summary-total">
            <span>Total</span>
            <span>RM360.00</span>
        </div>

        <button type="submit" class="place-order-btn" form="checkOut-formValidation">
            Place Order
        </button>

    </div>

  

</section>
  
<script src="checkOut.js"></script>
</body>

<footer class="footer">
    <div class="footer-left">
        <p>&#169 2026 UTeM ServaMart </p>
    </div>
    <div class="footer-right">
        <a href="#">Help Centre</a>
        <span>|</span>
        <a href="#">Contact Us</a>
    </div>
    
</footer>
</html>
